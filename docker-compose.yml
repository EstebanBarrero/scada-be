version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scada_backend
    ports:
      - "8000:8000"
    volumes:
      # Named volume: SQLite DB and generated CSV persist across container restarts.
      # Without this, every `docker compose up` starts with an empty database.
      - scada_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/scada.db
      - ETL_DATA_PATH=/app/data/raw_alarms.csv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  scada_data:
    driver: local
