version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scada_backend
    ports:
      - "8000:8000"
    volumes:
      # Bind mount: maps ./data on host to /app/data in container.
      # SQLite DB and generated CSV are visible locally and persist across restarts.
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/scada.db
      - ETL_DATA_PATH=/app/data/raw_alarms.csv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
